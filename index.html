<!DOCTYPE html>

<html>

<head>
		<title>Facebook?</title>
		<link rel="stylesheet" href="style.css">
</head>

<body>
		
<!-- Account 1 -->
		<div class="accs-box">
				
				<!-- 1st V-box -->
				<div class="v-box1">
						
						<img class="pfp" src="assets/images/sponge-bob.png" alt="spongebob's profile picture">
				</div>
						
						<!-- 2nd V-box -->
				<div class="v-box2">
						
						<div class="name-box">
								<p class="name">SpongeBob</p>
						</div>
						
						<div class="h-box1">
								
								<div class="mutual-person-box">
										<img class="mutual-pfp" src="assets/images/cat.jpeg" alt="friend's profile picture">
								</div>
								
								<div class="mutuals-amount-box">
										<p class="mutuals">4 mutual friends</p>
								</div>
						</div>
						
						<div class="add-btn-box">
								<button class="add-f">Add Friend</button>
						</div>
				</div>
		</div>
		
		<!--Account 2-->
		<div class="accs-box">
				
				<!-- 1st V-box -->
				<div class="v-box1">
						
						<img class="pfp" src="assets/images/adolf-bob.png" alt="spongebob's profile picture">
				</div>
						
						<!-- 2nd V-box -->
				<div class="v-box2">
						
						<div class="name-box">
								<p class="name">Adolf Bob</p>
						</div>
						
						<div class="h-box1">
								
								<div class="mutual-person-box">
										<img class="mutual-pfp" src="assets/images/cat.jpeg" alt="friend's profile picture">
								</div>
								
								<div class="mutuals-amount-box">
										<p class="mutuals">3 mutual friends</p>
								</div>
						</div>
						
						<div class="add-btn-box">
								<button class="add-f">Add Friend</button>
						</div>
				</div>
		</div>
		
		<!--Account 3-->
		<div class="accs-box">
				
				<!-- 1st V-box -->
				<div class="v-box1">
						
						<img class="pfp" src="assets/images/sponge-bob2.jpg" alt="spongebob's profile picture">
				</div>
						
						<!-- 2nd V-box -->
				<div class="v-box2">
						
						<div class="name-box">
								<p class="name">Sponge Dump</p>
						</div>
						
						<div class="h-box1">
								
								<div class="mutual-person-box">
										<img class="mutual-pfp" src="assets/images/cat.jpeg" alt="friend's profile picture">
								</div>
								
								<div class="mutuals-amount-box">
										<p class="mutuals">2 mutual friends</p>
								</div>
						</div>
						
						<div class="add-btn-box">
								<button class="add-f">Add Friend</button>
						</div>
				</div>
		</div>
</body>
</html>
